<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WalletCore</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      :root {
        --bg0: #070b10;
        --bg1: #0f1722;
        --line: #1b2a3a;
        --text: #d8dee9;
        --muted: #8b9bb4;
        --emerald: #10b981;
        --emerald-soft: rgba(16, 185, 129, 0.15);
        --danger-soft: rgba(251, 113, 133, 0.12);
      }
      
      body {
        background: var(--bg0);
        color: var(--text);
      }
      
      .wc-card {
        background: var(--bg1);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
      }
      
      .wc-btn {
        padding: 8px 14px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      
      .wc-btn:hover {
        border-color: var(--emerald);
        background: var(--emerald-soft);
      }
      
      .wc-btn-primary {
        border-color: var(--emerald);
        background: var(--emerald-soft);
      }
      
      input,
      select,
      textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        color: var(--text);
      }
      
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--emerald);
        box-shadow: 0 0 0 2px var(--emerald-soft);
        outline: none;
      }
      
      option {
        background-color: #ffffff;
        color: #111111;
      }
      
      select {
        width: 100%;
        height: 42px;
      
        padding: 8px 40px 8px 14px; /* ← bitno: left padding 14px */
      
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--text);
      
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
      
        background-image: linear-gradient(45deg, transparent 50%, rgba(216, 222, 233, 0.85) 50%), linear-gradient(135deg, rgba(216, 222, 233, 0.85) 50%, transparent 50%);
        background-position: calc(100% - 18px) 18px, calc(100% - 12px) 18px;
        background-size: 6px 6px, 6px 6px;
        background-repeat: no-repeat;
      }
      
      hr {
        border-color: var(--line);
      }
      
      a {
        text-decoration: none;
      }
      
      nav a {
        margin-right: 14px;
      }
    </style>
  </head>

  <body class="min-h-screen">
    <header class="border-b border-[color:var(--line)]">
      <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="{% url 'home' %}" class="font-semibold text-lg">WalletCore</a>

        <nav>
          {% if user.is_authenticated %}
            <a href="{% url 'finances:transaction_list' %}">Transactions</a>
            <a href="{% url 'finances:category_list' %}">Categories</a>
            <a href="{% url 'finances:goal_list' %}">Goals</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
              {% csrf_token %}
              <button class="wc-btn" type="submit">Logout</button>
            </form>
          {% else %}
            <a class="wc-btn" href="{% url 'login' %}">Login</a>
            <a class="wc-btn wc-btn-primary" href="{% url 'finances:register' %}">Register</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
      {% block content %}
      {% endblock %}
    </main>
  </body>
</html>
