{% extends "base.html" %}
{% block content %}

<h2>Delete Category</h2>

<p>Are you sure you want to delete "{{ object.name }}"?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit">Delete</button>
  <a href="{% url 'finances:category_detail' object.pk %}">Cancel</a>
</form>

{% endblock %}
