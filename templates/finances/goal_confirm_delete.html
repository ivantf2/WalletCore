{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl font-semibold mb-6">Delete Category</h2>

<div class="wc-card">
  <p class="text-[color:var(--muted)] mb-4">
    Are you sure you want to delete this category?
  </p>

  <div class="border border-[color:var(--line)] rounded-xl p-4 mb-4">
    <div class="font-medium">{{ object.name }}</div>
    <div class="text-sm text-[color:var(--muted)]">{{ object.type }}</div>
  </div>

  <form method="post" class="flex gap-2">
    {% csrf_token %}
    <button class="wc-btn" style="background: var(--danger-soft);" type="submit">Delete</button>
    <a class="wc-btn" href="{% url 'finances:category_detail' object.pk %}">Cancel</a>
  </form>
</div>

{% endblock %}
