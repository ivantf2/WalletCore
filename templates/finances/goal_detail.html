{% extends "base.html" %}
{% block content %}

<div class="flex items-center justify-between mb-6">
  <h2 class="text-2xl font-semibold">Financial Goal</h2>
  <div class="flex gap-2">
    <a class="wc-btn" href="{% url 'finances:goal_edit' object.pk %}">Edit</a>
    <a class="wc-btn" style="background: var(--danger-soft);" href="{% url 'finances:goal_delete' object.pk %}">Delete</a>
  </div>
</div>

<div class="wc-card space-y-2">
  <p><strong>Title:</strong> {{ object.title }}</p>
  <p><strong>Target:</strong> {{ object.target_amount }}</p>
  <p><strong>Current:</strong> {{ object.current_amount }}</p>
  <p><strong>Deadline:</strong> {{ object.deadline|default:"No deadline" }}</p>
</div>

<div class="mt-5">
  <a class="wc-btn" href="{% url 'finances:goal_list' %}">Back</a>
</div>

{% endblock %}
