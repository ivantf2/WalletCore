{% extends "base.html" %}
{% block content %}

<div class="flex items-center justify-between mb-6">
  <h2 class="text-2xl font-semibold">Categories</h2>
  <a class="wc-btn wc-btn-primary" href="{% url 'finances:category_create' %}">New</a>
</div>

<div class="wc-card p-0">
  <ul class="divide-y divide-[color:var(--line)]">
    {% for c in object_list %}
      <li class="p-4 hover:bg-[rgba(255,255,255,0.02)]">
        <a href="{% url 'finances:category_detail' c.pk %}">
          <div class="flex items-center justify-between">
            <div class="font-medium">{{ c.name }}</div>
            <div class="text-sm text-[color:var(--muted)]">{{ c.type }}</div>
          </div>
        </a>
      </li>
    {% empty %}
      <li class="p-4 text-[color:var(--muted)]">No categories.</li>
    {% endfor %}
  </ul>
</div>

{% endblock %}
